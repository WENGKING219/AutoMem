# AutoMem - Streamlit dark theme.

[theme]
base = "dark"
primaryColor = "#7C5CFF"           
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6E9EF"
font = "sans serif"

[server]
# Memory dumps are often larger than Streamlit's default upload limit.
# Value is in megabytes.
maxUploadSize = 8192

[browser]
gatherUsageStats = false
