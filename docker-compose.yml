services:
  volatility-mcp:
    build:
      context: ./volatility_mcp_server
      dockerfile: Dockerfile
    container_name: volatility-mcp
    ports:
      - "8000:8000"
    volumes:
      - ./memory_dumps:/data/memory_dumps:ro
      - volatility_cache:/data/cache
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_PATH: /mcp
      DUMPS_DIR: /data/memory_dumps
      CACHE_DIR: /data/cache/results
      VOL_FRAMEWORK_CACHE_DIR: /data/cache/volatility3-2.27-symbolpack-v1
      VOL_SYMBOL_DIRS: /app/symbols
      VOL_TIMEOUT: "300"
      MAX_OUTPUT: "2000000"
      MAX_ROWS_FULL: "80"
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket, subprocess, zipfile, Crypto.Cipher, yara; assert zipfile.is_zipfile('/app/symbols/windows.zip'); s=socket.create_connection(('127.0.0.1', 8000), 3); s.close(); subprocess.run(['vol', '-h'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL, check=True)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  volatility_cache:
