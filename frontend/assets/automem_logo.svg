<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="AutoMem">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#3DB8FF"/>
    </linearGradient>
  </defs>
  <!-- mark: stylised memory chip with magnifier dot -->
  <g transform="translate(8,8)">
    <rect x="0" y="0" width="40" height="40" rx="9" ry="9" fill="url(#g)"/>
    <g stroke="#0E1117" stroke-width="2.5" stroke-linecap="round">
      <line x1="6" y1="0"  x2="6"  y2="-4"/>
      <line x1="14" y1="0" x2="14" y2="-4"/>
      <line x1="22" y1="0" x2="22" y2="-4"/>
      <line x1="30" y1="0" x2="30" y2="-4"/>
      <line x1="6" y1="40"  x2="6"  y2="44"/>
      <line x1="14" y1="40" x2="14" y2="44"/>
      <line x1="22" y1="40" x2="22" y2="44"/>
      <line x1="30" y1="40" x2="30" y2="44"/>
      <line x1="0" y1="6"  x2="-4" y2="6"/>
      <line x1="0" y1="14" x2="-4" y2="14"/>
      <line x1="0" y1="22" x2="-4" y2="22"/>
      <line x1="0" y1="30" x2="-4" y2="30"/>
      <line x1="40" y1="6"  x2="44" y2="6"/>
      <line x1="40" y1="14" x2="44" y2="14"/>
      <line x1="40" y1="22" x2="44" y2="22"/>
      <line x1="40" y1="30" x2="44" y2="30"/>
    </g>
    <circle cx="20" cy="20" r="7" fill="#0E1117"/>
    <circle cx="20" cy="20" r="3.5" fill="#FFFFFF"/>
  </g>
  <!-- wordmark -->
  <text x="64" y="36"
        font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="700" fill="#E6E9EF"
        letter-spacing="-0.5">
    Auto<tspan fill="#7C5CFF">Mem</tspan>
  </text>
</svg>
